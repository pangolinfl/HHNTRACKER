<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HHN Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Creepster&family=Special+Elite&family=Cutive+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --black:#0a0a0a; --deep:#110d0d; --card:#160e0e;
  --red:#c0392b; --red-dim:#7a1f15;
  --orange:#e67e22; --orange-dim:#8a4a10;
  --yellow:#f1c40f; --purple:#8e44ad;
  --green:#27ae60;
  --parchment:#d9c9a8; --parchment-dim:#8a7d65;
  --border:#3a1a1a; --text:#c9b89a; --text-dim:#6b5a4a;
}

/* ── High Contrast Mode ── */
body.hc {
  --black:#000; --deep:#0a0a0a; --card:#111;
  --red:#ff4d4d; --red-dim:#cc1f1f;
  --orange:#ffaa00; --orange-dim:#cc8800;
  --yellow:#ffe033; --purple:#cc66ff;
  --green:#33ff77;
  --parchment:#ffffff; --parchment-dim:#dddddd;
  --border:#666; --text:#ffffff; --text-dim:#bbbbbb;
}
body.hc .card { border-width:2px }
body.hc .year-btn.active { box-shadow:0 0 0 2px #fff }
body.hc .meta-tag { border-width:1px; opacity:1 }
body.hc .card-title mark { background:rgba(255,77,77,.5); color:#fff }

/* ── Accessibility toggle button ── */
.a11y-btn {
  background: transparent;
  border: 1px solid var(--text-dim);
  color: var(--text-dim);
  font-family: 'Cutive Mono', monospace;
  font-size: .7rem;
  padding: 5px 10px;
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
  letter-spacing: .05em;
  display: flex;
  align-items: center;
  gap: 5px;
}

body.hc .a11y-btn { border-color: #fff; color: #fff; background: rgba(255,255,255,.1); }
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--black);color:var(--text);font-family:'Special Elite',serif;min-height:100vh;overflow-x:hidden}

/* header */
header{position:relative;text-align:center;padding:48px 20px 32px;background:linear-gradient(180deg,#1c0000,var(--black));border-bottom:2px solid var(--red-dim);overflow:hidden}
header::before{content:'';position:absolute;top:0;left:0;right:0;height:5px;background:var(--red);box-shadow:0 0 24px var(--red),0 0 50px rgba(192,57,43,.4)}
.drip-bar{position:absolute;top:5px;left:0;right:0;display:flex;justify-content:space-around;pointer-events:none}
.drip{width:7px;background:var(--red);border-radius:0 0 4px 4px;animation:drip var(--dur,3s) ease-in-out infinite;animation-delay:var(--delay,0s)}
@keyframes drip{0%,100%{height:var(--h1,8px);opacity:.7}50%{height:var(--h2,35px);opacity:1}}
.site-title{font-family:'Creepster',cursive;font-size:clamp(3.5rem,9vw,7.5rem);color:var(--red);text-shadow:0 0 40px rgba(192,57,43,.55),3px 3px 0 #000;line-height:.9;position:relative;z-index:1;letter-spacing:.08em}
.site-sub{font-family:'Cutive Mono',monospace;font-size:.75rem;letter-spacing:.35em;color:var(--parchment-dim);text-transform:uppercase;margin-top:10px;position:relative;z-index:1}

/* ── Top bar ── */
.topbar{position:sticky;top:0;z-index:200;background:rgba(10,10,10,.97);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:10px}
.menu-btn{background:transparent;border:1px solid var(--red-dim);color:var(--red);font-family:'Cutive Mono',monospace;font-size:.85rem;padding:6px 10px;cursor:pointer;transition:all .12s;flex:0 0 auto;line-height:1}

.search-input{flex:1;background:var(--card);border:1px solid var(--border);color:var(--text);font-family:'Special Elite',serif;font-size:.9rem;padding:8px 14px;outline:none;transition:border-color .18s;min-width:0}
.search-input:focus{border-color:var(--red-dim);box-shadow:0 0 0 2px rgba(192,57,43,.1)}
.search-input::placeholder{color:var(--text-dim)}
.action-btn{background:transparent;border:1px solid var(--red-dim);color:var(--red);font-family:'Cutive Mono',monospace;font-size:.78rem;padding:5px 11px;cursor:pointer;transition:all .12s;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap;flex:0 0 auto}


/* ── Drawer overlay ── */
.drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:300;opacity:0;pointer-events:none;transition:opacity .25s ease}
.drawer-overlay.open{opacity:1;pointer-events:all}

/* ── Drawer panel ── */
.drawer{position:fixed;top:0;left:0;height:100%;width:300px;max-width:85vw;background:var(--deep);border-right:2px solid var(--red-dim);z-index:400;transform:translateX(-100%);transition:transform .28s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;overflow:hidden}
.drawer.open{transform:translateX(0)}
body.hc .drawer{border-right-color:var(--red)}

.drawer-header{padding:16px 18px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.drawer-title{font-family:'Creepster',cursive;font-size:1.8rem;color:var(--red);text-shadow:1px 1px 0 #000;letter-spacing:.06em}
.drawer-close{background:transparent;border:1px solid var(--border);color:var(--text-dim);font-size:1rem;width:32px;height:32px;cursor:pointer;transition:all .12s;display:flex;align-items:center;justify-content:center;font-family:'Cutive Mono',monospace}
.drawer-close:hover{border-color:var(--red);color:var(--red)}

.drawer-body{padding:18px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:24px}
.drawer-body::-webkit-scrollbar{width:4px}
.drawer-body::-webkit-scrollbar-thumb{background:var(--red-dim)}

.drawer-section-title{font-family:'Cutive Mono',monospace;font-size:.7rem;letter-spacing:.25em;color:var(--text-dim);text-transform:uppercase;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}

/* Year buttons inside drawer */
.ctrl-label{font-family:'Cutive Mono',monospace;font-size:.75rem;letter-spacing:.2em;color:var(--text-dim);text-transform:uppercase;white-space:nowrap}
.year-buttons{display:flex;flex-wrap:wrap;gap:5px}
.year-btn{background:transparent;border:1px solid var(--border);color:var(--text-dim);font-family:'Cutive Mono',monospace;font-size:.8rem;padding:5px 10px;cursor:pointer;transition:all .12s;white-space:nowrap}

.year-btn.active{background:var(--red);border-color:var(--red);color:#fff;box-shadow:0 0 8px rgba(192,57,43,.35)}

.drawer-year-actions{display:flex;gap:6px;margin-bottom:10px}

/* Type buttons inside drawer */
.type-btn{background:transparent;border:1px solid;font-family:'Cutive Mono',monospace;font-size:.78rem;padding:6px 14px;cursor:pointer;transition:all .12s;text-transform:uppercase;letter-spacing:.06em;border-radius:2px;-webkit-tap-highlight-color:transparent;touch-action:manipulation;outline:none;width:100%;text-align:left;margin-bottom:5px}
.type-btn:focus{outline:none}
.year-btn:focus,.action-btn:focus,.a11y-btn:focus,.loc-btn:focus,.menu-btn:focus{outline:none}
.year-btn:focus:not(:focus-visible),.action-btn:focus:not(:focus-visible),.a11y-btn:focus:not(:focus-visible),.loc-btn:focus:not(:focus-visible),.type-btn:focus:not(:focus-visible){background:transparent;box-shadow:none}
.type-btn.tb-house{color:#e74c3c;border-color:rgba(231,76,60,.4)}

.type-btn.tb-scarezone{color:var(--orange);border-color:rgba(230,126,18,.4)}

.type-btn.tb-show{color:var(--yellow);border-color:rgba(241,196,15,.4)}

.type-btn.tb-note{color:var(--purple);border-color:rgba(142,68,173,.4)}
.type-btn.tb-day{color:#7fb3d3;border-color:rgba(127,179,211,.35);padding:4px 8px}
.type-btn.tb-ip{color:#e74c3c;border-color:rgba(231,76,60,.4)}
.type-btn.tb-orig{color:#27ae60;border-color:rgba(39,174,96,.4)}
.type-btn.tb-untagged{color:var(--text-dim);border-color:var(--border)}
/* Type button active states (always) */
.type-btn.tb-house.active{background:#e74c3c;color:#fff;border-color:#e74c3c}
.type-btn.tb-scarezone.active{background:var(--orange);color:#fff;border-color:var(--orange)}
.type-btn.tb-show.active{background:var(--yellow);color:#111;border-color:var(--yellow)}
.type-btn.tb-note.active{background:var(--purple);color:#fff;border-color:var(--purple)}
.type-btn.tb-day.active{background:#7fb3d3;color:#111;border-color:#7fb3d3}
.type-btn.tb-ip.active{background:#e74c3c;color:#fff;border-color:#e74c3c}
.type-btn.tb-orig.active{background:#27ae60;color:#fff;border-color:#27ae60}
.type-btn.tb-untagged.active{background:var(--text-dim);color:#111;border-color:var(--text-dim)}


.drawer-footer{padding:14px 18px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:8px;flex-shrink:0}

/* Location filter chips */
.loc-buttons{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:4px}
.loc-btn{background:transparent;border:1px solid var(--border);color:var(--text-dim);font-family:'Cutive Mono',monospace;font-size:.7rem;padding:3px 9px;cursor:pointer;transition:all .12s;white-space:nowrap;border-radius:2px;letter-spacing:.03em}

.loc-btn.active{background:var(--parchment-dim);border-color:var(--parchment-dim);color:var(--black)}
.loc-actions{display:flex;gap:6px;margin-bottom:10px}
.loc-type-group{margin-bottom:12px}
.loc-type-label{font-family:'Cutive Mono',monospace;font-size:.65rem;letter-spacing:.15em;text-transform:uppercase;padding:3px 8px;margin-bottom:6px;display:inline-flex;border-left:2px solid;opacity:.85}
.drawer-active-badge{display:inline-block;background:var(--red);color:#fff;font-family:'Cutive Mono',monospace;font-size:.6rem;padding:1px 5px;border-radius:2px;margin-left:6px;vertical-align:middle}

/* search moved into topbar */

/* status / loading */
@keyframes shimmer{0%{left:-40%}100%{left:100%}}
#loadingBar{display:none;background:var(--red);height:3px;width:100%;position:relative;overflow:hidden}
#loadingBar div{position:absolute;height:100%;width:40%;background:rgba(255,255,255,.3);animation:shimmer 1s infinite linear}
#statusMsg{display:none;margin:10px 20px;font-family:'Cutive Mono',monospace;font-size:.82rem;padding:10px 14px;border:1px solid;line-height:1.5;transition:opacity .6s ease}
.status-loading{color:var(--parchment-dim);border-color:var(--border);background:rgba(255,255,255,.02)}
.status-ok{color:var(--green);border-color:rgba(39,174,96,.3);background:rgba(39,174,96,.05)}
.status-warn{color:var(--orange);border-color:rgba(230,126,18,.3);background:rgba(230,126,18,.05)}

/* stats */
.stats-bar{padding:6px 20px;background:var(--deep);border-bottom:1px solid var(--border);display:flex;gap:16px;flex-wrap:wrap}
.stat{font-family:'Cutive Mono',monospace;font-size:.78rem;color:var(--text-dim)}
.stat b{color:var(--orange)}

/* main */
main{padding:20px;max-width:1500px;margin:0 auto}

/* year section */
.year-section{margin-bottom:40px;animation:fadeUp .22s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.year-header{display:flex;align-items:baseline;gap:12px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border);position:relative}
.year-header::after{content:'';position:absolute;bottom:-1px;left:0;width:48px;height:2px;background:var(--red);box-shadow:0 0 8px var(--red)}
.year-label{font-family:'Creepster',cursive;font-size:3rem;color:var(--red);text-shadow:2px 2px 0 #000;line-height:1;display:inline-flex;align-items:center;gap:6px}
.year-weather-tag{font-family:'Cutive Mono',monospace;font-size:.72rem;color:#7fb3d3;border:1px solid rgba(127,179,211,.3);padding:3px 8px;background:rgba(127,179,211,.06);white-space:nowrap;align-self:center}
.year-count{margin-left:auto;font-family:'Cutive Mono',monospace;font-size:.75rem;color:var(--text-dim);background:var(--card);border:1px solid var(--border);padding:3px 8px}

/* type group within year */
.type-group{margin-bottom:18px}
.type-group-header{font-family:'Cutive Mono',monospace;font-size:.77rem;letter-spacing:.2em;text-transform:uppercase;padding:4px 10px;margin-bottom:10px;display:inline-flex;align-items:center;gap:6px;border-left:3px solid}
.tgh-house{color:#e74c3c;border-color:#e74c3c;background:rgba(231,76,60,.07)}
.tgh-scarezone{color:var(--orange);border-color:var(--orange);background:rgba(230,126,18,.07)}
.tgh-show{color:var(--yellow);border-color:var(--yellow);background:rgba(241,196,15,.07)}
.tgh-note{color:var(--purple);border-color:var(--purple);background:rgba(142,68,173,.07)}

/* cards */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px}
.card{background:var(--card);border:1px solid var(--border);padding:13px 15px;position:relative;transition:all .16s;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;transition:background .16s,box-shadow .16s}
.card-house::before{background:rgba(231,76,60,.4)}
.card-scarezone::before{background:rgba(230,126,18,.4)}
.card-show::before{background:rgba(241,196,15,.4)}
.card-note::before{background:rgba(142,68,173,.4)}
.card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.5)}
.card-house:hover{border-color:rgba(231,76,60,.4)}
.card-house:hover::before{background:#e74c3c;box-shadow:0 0 8px #e74c3c}
.card-scarezone:hover{border-color:rgba(230,126,18,.4)}
.card-scarezone:hover::before{background:var(--orange);box-shadow:0 0 8px var(--orange)}
.card-show:hover{border-color:rgba(241,196,15,.3)}
.card-show:hover::before{background:var(--yellow);box-shadow:0 0 8px var(--yellow)}
.card-note:hover{border-color:rgba(142,68,173,.4)}
.card-note:hover::before{background:var(--purple);box-shadow:0 0 8px var(--purple)}
.card-title{font-family:'Special Elite',serif;font-size:.95rem;color:var(--parchment);line-height:1.3;margin-bottom:7px}
.card-title mark{background:rgba(192,57,43,.35);color:var(--parchment);border-radius:2px;padding:0 2px}
.card-meta{display:flex;flex-wrap:wrap;gap:5px}
.meta-tag{font-family:'Cutive Mono',monospace;font-size:.75rem;color:var(--text-dim);background:rgba(255,255,255,.03);border:1px solid var(--border);padding:2px 7px;letter-spacing:.04em}
.meta-date{color:var(--orange)}
.meta-loc{color:var(--parchment-dim)}
.meta-day{color:#7fb3d3}
.card-inner{position:relative;padding-right:0}
.ip-badge{position:absolute;top:-2px;right:-2px;font-family:'Cutive Mono',monospace;font-size:.6rem;padding:2px 7px;letter-spacing:.08em;text-transform:uppercase}
.ip-badge-ip{background:rgba(231,76,60,.15);color:#e74c3c;border-left:2px solid #e74c3c;border-bottom:2px solid #e74c3c;border-bottom-left-radius:2px}
.ip-badge-orig{background:rgba(39,174,96,.12);color:#27ae60;border-left:2px solid #27ae60;border-bottom:2px solid #27ae60;border-bottom-left-radius:2px}

.empty{text-align:center;padding:80px 20px;font-family:'Creepster',cursive;color:var(--red-dim);font-size:2rem}

/* scrollbar */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--black)}
::-webkit-scrollbar-thumb{background:var(--red-dim);border-radius:3px}

footer{text-align:center;padding:28px 20px;border-top:1px solid var(--border);margin-top:28px;font-family:'Cutive Mono',monospace;font-size:.75rem;color:var(--text-dim);letter-spacing:.12em}

@media(max-width:600px){
  .cards-grid{grid-template-columns:1fr}
  .site-title{font-size:3rem}
  .year-header{flex-wrap:wrap}
  .year-count{margin-left:0}
  main{padding:12px}
  .stats-bar{padding-left:12px;padding-right:12px}
}

/* Hover effects — only on pointer devices (prevents stuck hover on touch) */
@media (hover: hover) and (pointer: fine) {
  .year-btn:hover{border-color:var(--red-dim);color:var(--parchment);background:rgba(192,57,43,.07)}
  .action-btn:hover{background:var(--red);color:#fff}
  .a11y-btn:hover{border-color:var(--parchment);color:var(--parchment)}
  .menu-btn:hover{background:var(--red);color:#fff}
  .loc-btn:hover{border-color:var(--parchment-dim);color:var(--parchment)}
  .type-btn.tb-house:hover{background:#e74c3c;color:#fff;border-color:#e74c3c}
  .type-btn.tb-scarezone:hover{background:var(--orange);color:#fff;border-color:var(--orange)}
  .type-btn.tb-show:hover{background:var(--yellow);color:#111;border-color:var(--yellow)}
  .type-btn.tb-note:hover{background:var(--purple);color:#fff;border-color:var(--purple)}
  .type-btn.tb-day:hover{background:#7fb3d3;color:#111;border-color:#7fb3d3}
  .type-btn.tb-ip:hover{background:#e74c3c;color:#fff;border-color:#e74c3c}
  .type-btn.tb-orig:hover{background:#27ae60;color:#fff;border-color:#27ae60}
  .type-btn.tb-untagged:hover{background:var(--text-dim);color:#111;border-color:var(--text-dim)}
}
</style>
</head>
<body>

<header>
  <div class="drip-bar" id="drips"></div>
  <div class="site-title">HHN TRACKER</div>
  <div class="site-sub"> Please Follow @PangolinFL</div>
  <div class="site-sub"> Halloween Horror Nights &bull; Full Tracker Archive &bull; 1991 – PRESENT</div>
</header>

<!-- Drawer overlay -->
<div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>

<!-- Slide-in drawer -->
<div class="drawer" id="drawer">
  <div class="drawer-header">
    <div class="drawer-title">Filters</div>
    <button class="drawer-close" onclick="closeDrawer()">✕</button>
  </div>
  <div class="drawer-body">

    <!-- Year filter -->
    <div>
      <div class="drawer-section-title">Year</div>
      <div class="drawer-year-actions">
        <button class="action-btn" onclick="selectAll()">All</button>
        <button class="action-btn" onclick="clearAll()">Clear</button>
      </div>
      <div class="year-buttons" id="yearBtns"></div>
    </div>

    <!-- Type filter -->
    <div>
      <div class="drawer-section-title">Type</div>
      <button class="type-btn tb-house active" data-type="HOUSE" onclick="toggleType(this)">🏚 Houses</button>
      <button class="type-btn tb-scarezone active" data-type="SCAREZONE" onclick="toggleType(this)">🌫 Scare Zones</button>
      <button class="type-btn tb-show active" data-type="SHOW" onclick="toggleType(this)">🎭 Shows</button>
      <button class="type-btn tb-note active" data-type="NOTE" onclick="toggleType(this)">📌 Notes</button>
    </div>

    <!-- IP / Original filter -->
    <div>
      <div class="drawer-section-title">IP or Original</div>
      <button class="type-btn tb-ip active" data-ip="IP" onclick="toggleIP(this)">🎬 IP</button>
      <button class="type-btn tb-orig active" data-ip="ORIG" onclick="toggleIP(this)">✨ Original</button>
      <button class="type-btn tb-untagged active" data-ip="NONE" onclick="toggleIP(this)">— Untagged</button>
    </div>

    <!-- Location filter -->
    <div>
      <div class="drawer-section-title">Day of Week</div>
      <div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:4px">
        <button class="type-btn tb-day active" data-day="Mon" onclick="toggleDay(this)">Mon</button>
        <button class="type-btn tb-day active" data-day="Tue" onclick="toggleDay(this)">Tue</button>
        <button class="type-btn tb-day active" data-day="Wed" onclick="toggleDay(this)">Wed</button>
        <button class="type-btn tb-day active" data-day="Thu" onclick="toggleDay(this)">Thu</button>
        <button class="type-btn tb-day active" data-day="Fri" onclick="toggleDay(this)">Fri</button>
        <button class="type-btn tb-day active" data-day="Sat" onclick="toggleDay(this)">Sat</button>
        <button class="type-btn tb-day active" data-day="Sun" onclick="toggleDay(this)">Sun</button>
        <button class="type-btn tb-day active" data-day="NONE" onclick="toggleDay(this)">— Untagged</button>
      </div>
    </div>

    <!-- Location filter -->
    <div>
      <div class="drawer-section-title">Location <span id="locBadge" class="drawer-active-badge" style="display:none"></span></div>
      <div class="loc-actions">
        <button class="action-btn" onclick="selectAllLocs()">All</button>
        <button class="action-btn" onclick="clearAllLocs()">Clear</button>
      </div>
      <div class="loc-type-group">
        <div class="loc-type-label tgh-house">🏚 Houses</div>
        <div class="loc-buttons" id="locBtnsHouse"></div>
      </div>
      <div class="loc-type-group">
        <div class="loc-type-label tgh-scarezone">🌫 Scare Zones</div>
        <div class="loc-buttons" id="locBtnsScarezone"></div>
      </div>
      <div class="loc-type-group">
        <div class="loc-type-label tgh-show">🎭 Shows</div>
        <div class="loc-buttons" id="locBtnsShow"></div>
      </div>
    </div>

  </div>
  <div class="drawer-footer">
    <button class="action-btn" onclick="fetchSheets()" style="width:100%;justify-content:center">↻ Sync Data</button>
    <button class="a11y-btn" id="a11yBtn" onclick="toggleA11y()" style="width:100%;justify-content:center">⚡ High Contrast</button>
  </div>
</div>

<!-- Top bar: menu button + search -->
<div class="topbar">
  <button class="menu-btn" onclick="openDrawer()" title="Open filters">☰ Filters</button>
  <input class="search-input" id="searchInput" type="text" placeholder="Search attractions, locations, years…" oninput="render()">
</div>

<div id="loadingBar"><div></div></div>
<div id="statusMsg"></div>
<div class="stats-bar" id="statsBar"></div>

<main id="main"></main>
<footer>HHN ARCHIVE &bull; 456 ATTRACTIONS &bull; 1991 – PRESENT &bull; DATA VIA @GARYPOUNDS ON TWITTER</footer>

<script>

const WEATHER_DATA = {"1991":{"rain":false,"temp":76},"1992":{"rain":true,"temp":67},"1993":{"rain":true,"temp":70},"1994":{"rain":false,"temp":78},"1995":{"rain":false,"temp":80},"1996":{"rain":false,"temp":70},"1997":{"rain":false,"temp":76},"1998":{"rain":false,"temp":80},"1999":{"rain":false,"temp":79},"2000":{"rain":false,"temp":81},"2001":{"rain":false,"temp":78},"2002":{"rain":false,"temp":79},"2003":{"rain":false,"temp":74},"2004":{"rain":false,"temp":81},"2005":{"rain":false,"temp":80},"2006":{"rain":false,"temp":79},"2007":{"rain":false,"temp":78},"2008":{"rain":false,"temp":78},"2009":{"rain":true,"temp":82},"2010":{"rain":true,"temp":79},"2011":{"rain":true,"temp":73},"2012":{"rain":true,"temp":73},"2013":{"rain":false,"temp":79},"2014":{"rain":true,"temp":72},"2015":{"rain":false,"temp":80},"2016":{"rain":true,"temp":82},"2017":{"rain":false,"temp":81},"2018":{"rain":false,"temp":88},"2019":{"rain":false,"temp":86},"2020":{"rain":true,"temp":77},"2021":{"rain":true,"temp":77},"2022":{"rain":true,"temp":82},"2023":{"rain":true,"temp":77},"2024":{"rain":false,"temp":81},"2025":{"rain":false,"temp":81}};
let selectedYears = new Set();
let selectedTypes = new Set(['HOUSE','SCAREZONE','SHOW','NOTE']);
let selectedLocs = new Set();
let selectedIPs = new Set(['IP','ORIG','NONE']);
let selectedDays = new Set(['Mon','Tue','Wed','Thu','Fri','Sat','Sun','NONE']); // NONE = untagged

// ── fetch ────────────────────────────────────
async function fetchSheets() {
  setStatus('🩸 Syncing Data…','loading');
  showLoading(true);
  try {
    const res = await Promise.race([
      fetch(SHEETDB_URL),
      new Promise((_,rej)=>setTimeout(()=>rej(new Error('Timeout')),10000))
    ]);
    if (!res.ok) throw new Error('HTTP '+res.status);
    const json = await res.json();
    if (!Array.isArray(json)||!json.length) throw new Error('Empty response');
    const first = json[0];
    const yearKey  = Object.keys(first).find(k=>/year/i.test(k));
    const nameKey  = Object.keys(first).find(k=>/attraction|name|title/i.test(k));
    const typeKey  = Object.keys(first).find(k=>/type|category|h,/i.test(k));
    const locKey   = Object.keys(first).find(k=>/location|venue/i.test(k));
    const dateKey  = Object.keys(first).find(k=>/date/i.test(k));
    if (!yearKey||!nameKey) throw new Error('Cannot find Year/Attraction columns');
    const parsed = [];
    json.forEach(row=>{
      const year=parseInt(row[yearKey]);
      const attraction=(row[nameKey]||'').trim();
      if (!year||!attraction) return;
      let type=(typeKey?row[typeKey]||'':'').toUpperCase().trim();
      if (type==='HOUSES') type='HOUSE';
      if (type==='SHOWS') type='SHOW';
      if (type==='SCAREZONES'||type==='SCARE ZONE') type='SCAREZONE';
      if (!['HOUSE','SCAREZONE','SHOW','NOTE'].includes(type)) type='NOTE';
      const ipKey2=Object.keys(first).find(k=>/^ip/i.test(k.trim())||/original/i.test(k.trim()));
      const dayKey2=Object.keys(first).find(k=>/day/i.test(k.trim()));
      parsed.push({
        year,
        attraction,
        type,
        location:(locKey?row[locKey]||'':'').trim(),
        date:(dateKey?row[dateKey]||'':'').trim(),
        ip:(ipKey2?(row[ipKey2]||'').trim().toUpperCase():''),
        day:(dayKey2?(row[dayKey2]||'').trim():''),
      });
    });
    if (!parsed.length) throw new Error('No valid rows');
    liveData=parsed;
    selectedYears=new Set();
    setStatus('✅ Synced — '+parsed.length+' attractions loaded!','ok',4000);
    refresh();
  } catch(err) {
    console.warn('SheetDB failed:',err.message);
    setStatus('⚠️ Live sync failed ('+err.message+'). Showing built-in data last updated May 14, 2026.','warn',5000);
    liveData=[...FALLBACK_DATA];
    refresh();
  } finally { showLoading(false); }
}

function showLoading(on){document.getElementById('loadingBar').style.display=on?'block':'none'}

let _statusTimer=null;
function setStatus(msg,type,autoDismissMs){
  const el=document.getElementById('statusMsg');
  clearTimeout(_statusTimer);
  el.style.opacity='1';
  el.textContent=msg; el.className='status-'+type; el.style.display='block';
  if(autoDismissMs){
    _statusTimer=setTimeout(()=>{
      el.style.opacity='0';
      setTimeout(()=>{el.style.display='none';el.style.opacity='1';},650);
    },autoDismissMs);
  }
}

// ── year buttons ─────────────────────────────
function refresh(){
  const years=[...new Set(liveData.map(d=>d.year))].sort((a,b)=>b-a);
  if (!selectedYears.size) selectedYears=new Set(years);
  buildYearBtns(years);
  buildLocBtns();
  render();
}

function buildYearBtns(years){
  const c=document.getElementById('yearBtns');
  c.innerHTML='';
  years.forEach(y=>{
    const b=document.createElement('button');
    b.className='year-btn'+(selectedYears.has(y)?' active':'');
    b.textContent=y;
    b.onclick=()=>{selectedYears.has(y)?selectedYears.delete(y):selectedYears.add(y);buildYearBtns(years);render()};
    c.appendChild(b);
  });
}

function selectAll(){selectedYears=new Set([...new Set(liveData.map(d=>d.year))]);refresh()}
function clearAll(){selectedYears=new Set();const years=[...new Set(liveData.map(d=>d.year))].sort((a,b)=>b-a);buildYearBtns(years);render()}

// ── type filter ──────────────────────────────
function toggleType(btn){
  const t=btn.dataset.type;
  if (selectedTypes.has(t)){
    if (selectedTypes.size===1) return; // keep at least one
    selectedTypes.delete(t);
    btn.classList.remove('active');
  } else {
    selectedTypes.add(t);
    btn.classList.add('active');
  }
  render();
}

// ── render ────────────────────────────────────
function render(){
  const q=document.getElementById('searchInput').value.toLowerCase().trim();
  const esc=q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');

  const filtered=liveData.filter(d=>{
    const ipKey=d.ip?d.ip:'NONE';
    const dayKey=d.day?d.day:'NONE';
    return selectedYears.has(d.year)&&
    selectedTypes.has(d.type)&&
    selectedIPs.has(ipKey)&&
    selectedDays.has(dayKey)&&
    (selectedLocs.size===0||selectedLocs.has(d.location)||(!d.location&&selectedLocs.size===0))&&
    (!q||d.attraction.toLowerCase().includes(q)||d.location.toLowerCase().includes(q)||String(d.year).includes(q)||d.date.toLowerCase().includes(q)||(d.ip&&d.ip.toLowerCase().includes(q))||(d.day&&d.day.toLowerCase().includes(q)));
  });

  const years=[...new Set(filtered.map(d=>d.year))].sort((a,b)=>b-a);
  const counts={};
  TYPE_ORDER.forEach(t=>{counts[t]=filtered.filter(d=>d.type===t).length});

  document.getElementById('statsBar').innerHTML=
    `<div class="stat">Showing <b>${filtered.length}</b> attractions</div>`+
    `<div class="stat">Years: <b>${years.length}</b></div>`+
    TYPE_ORDER.filter(t=>counts[t]>0).map(t=>`<div class="stat">${TYPE_LABELS[t].split(' ').slice(1).join(' ')}: <b>${counts[t]}</b></div>`).join('');

  const main=document.getElementById('main');
  if (!filtered.length){main.innerHTML='<div class="empty">Nothing Stirs in the Dark…</div>';return}

  const byYear={};
  filtered.forEach(d=>{(byYear[d.year]=byYear[d.year]||[]).push(d)});

  main.innerHTML=years.map(year=>{
    const entries=byYear[year];
    // group by type within year
    const byType={};
    entries.forEach(e=>{(byType[e.type]=byType[e.type]||[]).push(e)});

    const typeGroups=TYPE_ORDER.filter(t=>byType[t]&&byType[t].length).map(t=>{
      const cls=TYPE_CLS[t];
      const cards=byType[t].map(e=>{
        const title=q?e.attraction.replace(new RegExp(`(${esc})`,'gi'),'<mark>$1</mark>'):e.attraction;
        const locHtml=q&&e.location?e.location.replace(new RegExp(`(${esc})`,'gi'),'<mark>$1</mark>'):e.location;
        const ipBadge=e.ip==='IP'?'<div class="ip-badge ip-badge-ip">IP</div>':e.ip==='ORIG'?'<div class="ip-badge ip-badge-orig">ORIG</div>':'';
        const pr=e.ip?'padding-right:50px':'';
        return `<div class="card card-${cls}">
          <div class="card-inner">
            ${ipBadge}
            <div class="card-title" style="${pr}">${title}</div>
          </div>
          <div class="card-meta">
            ${e.date?`<span class="meta-tag meta-date">📅 ${e.date}</span>`:''}
            ${e.day?`<span class="meta-tag meta-day">📆 ${e.day}</span>`:''}
            ${e.location?`<span class="meta-tag meta-loc">📍 ${locHtml}</span>`:''}
          </div>
        </div>`;
      }).join('');
      return `<div class="type-group">
        <div class="type-group-header tgh-${cls}">${TYPE_LABELS[t]} <span style="opacity:.6;font-size:.9em">(${byType[t].length})</span></div>
        <div class="cards-grid">${cards}</div>
      </div>`;
    }).join('');

    const w=WEATHER_DATA[String(year)];
    const rainIcon=w&&w.rain?' 🌧️':'';
    const tempTag=w?`<span class="year-weather-tag">${w.temp}°F avg</span>`:'';
    return `<section class="year-section">
      <div class="year-header">
        <div class="year-label">${year}${rainIcon}</div>
        ${tempTag}
        <div class="year-count">${entries.length} attractions</div>
      </div>
      ${typeGroups}
    </section>`;
  }).join('');
}

// ── location filter ──────────────────────────
function getLocsByType(type) {
  return [...new Set(
    liveData.filter(d => d.type === type && d.location).map(d => d.location)
  )].sort();
}
function getAllLocs() {
  return [...new Set(liveData.map(d=>d.location).filter(Boolean))].sort();
}
function buildLocBtns() {
  const allLocs = getAllLocs();
  const groups = [
    { type:'HOUSE',     id:'locBtnsHouse' },
    { type:'SCAREZONE', id:'locBtnsScarezone' },
    { type:'SHOW',      id:'locBtnsShow' },
  ];
  groups.forEach(({ type, id }) => {
    const locs = getLocsByType(type);
    const container = document.getElementById(id);
    container.innerHTML = '';
    locs.forEach(loc => {
      const b = document.createElement('button');
      const isActive = selectedLocs.size === 0 || selectedLocs.has(loc);
      b.className = 'loc-btn' + (isActive ? ' active' : '');
      b.textContent = loc;
      b.onclick = () => toggleLoc(loc);
      container.appendChild(b);
    });
  });
  // update badge
  const badge = document.getElementById('locBadge');
  if (selectedLocs.size > 0 && selectedLocs.size < allLocs.length) {
    badge.textContent = selectedLocs.size + ' selected';
    badge.style.display = 'inline-block';
  } else {
    badge.style.display = 'none';
  }
}
function toggleLoc(loc) {
  const locs = getAllLocs();
  if (selectedLocs.size === 0) {
    locs.forEach(l => { if (l !== loc) selectedLocs.add(l); });
  } else if (selectedLocs.has(loc)) {
    selectedLocs.delete(loc);
    if (selectedLocs.size === 0) selectedLocs = new Set();
  } else {
    selectedLocs.add(loc);
    if (selectedLocs.size === locs.length) selectedLocs = new Set();
  }
  buildLocBtns();
  render();
}
function selectAllLocs() { selectedLocs = new Set(); buildLocBtns(); render(); }
function clearAllLocs()  {
  selectedLocs = new Set(['__NONE__']);
  buildLocBtns();
  render();
}

// ── IP/ORIG filter ───────────────────────────
function toggleIP(btn) {
  const ip = btn.dataset.ip;
  if (selectedIPs.has(ip)) {
    if (selectedIPs.size === 1) return;
    selectedIPs.delete(ip);
    btn.classList.remove('active');
  } else {
    selectedIPs.add(ip);
    btn.classList.add('active');
  }
  render();
}

// ── Day of week filter ───────────────────────
function toggleDay(btn) {
  const day = btn.dataset.day;
  if (selectedDays.has(day)) {
    if (selectedDays.size === 1) return;
    selectedDays.delete(day);
    btn.classList.remove('active');
  } else {
    selectedDays.add(day);
    btn.classList.add('active');
  }
  render();
}

  document.getElementById('drawer').classList.remove('open');

document.addEventListener('keydown',e=>{if(e.key==='Escape')closeDrawer()});

// ── accessibility ────────────────────────────
function toggleA11y(){
  const on = document.body.classList.toggle('hc');
  document.getElementById('a11yBtn').innerHTML = on ? '⚡ Standard' : '⚡ Contrast';
  try { localStorage.setItem('hhn-hc', on ? '1' : ''); } catch(e){}
}
function initA11y(){
  try {
    if (localStorage.getItem('hhn-hc') === '1') {
      document.body.classList.add('hc');
      document.getElementById('a11yBtn').innerHTML = '⚡ Standard';
    }
  } catch(e){}
}

// ── init ──────────────────────────────────────
function init(){
  const bar=document.getElementById('drips');
  for(let i=0;i<28;i++){
    const d=document.createElement('div');
    d.className='drip';
    d.style.cssText=`--h1:${(Math.random()*10+4).toFixed(0)}px;--h2:${(Math.random()*38+10).toFixed(0)}px;--dur:${(Math.random()*2+2).toFixed(1)}s;--delay:${(Math.random()*3).toFixed(1)}s`;
    bar.appendChild(d);
  }
  initA11y();
  fetchSheets();
}

init();

document.addEventListener('touchend',e=>{
  const t = e.target;
  if(t.classList.contains('type-btn') ||
     t.classList.contains('year-btn') ||
     t.classList.contains('action-btn') ||
