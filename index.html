<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HHN — Archive</title>
<link href="https://fonts.googleapis.com/css2?family=Creepster&family=Special+Elite&family=Cutive+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --black:#0a0a0a; --deep:#110d0d; --card:#160e0e;
  --red:#c0392b; --red-dim:#7a1f15;
  --orange:#e67e22; --orange-dim:#8a4a10;
  --yellow:#f1c40f; --purple:#8e44ad;
  --green:#27ae60;
  --parchment:#d9c9a8; --parchment-dim:#8a7d65;
  --border:#3a1a1a; --text:#c9b89a; --text-dim:#6b5a4a;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--black);color:var(--text);font-family:'Special Elite',serif;min-height:100vh;overflow-x:hidden}

/* header */
header{position:relative;text-align:center;padding:48px 20px 32px;background:linear-gradient(180deg,#1c0000,var(--black));border-bottom:2px solid var(--red-dim);overflow:hidden}
header::before{content:'';position:absolute;top:0;left:0;right:0;height:5px;background:var(--red);box-shadow:0 0 24px var(--red),0 0 50px rgba(192,57,43,.4)}
.drip-bar{position:absolute;top:5px;left:0;right:0;display:flex;justify-content:space-around;pointer-events:none}
.drip{width:7px;background:var(--red);border-radius:0 0 4px 4px;animation:drip var(--dur,3s) ease-in-out infinite;animation-delay:var(--delay,0s)}
@keyframes drip{0%,100%{height:var(--h1,8px);opacity:.7}50%{height:var(--h2,35px);opacity:1}}
.site-title{font-family:'Creepster',cursive;font-size:clamp(3.5rem,9vw,7.5rem);color:var(--red);text-shadow:0 0 40px rgba(192,57,43,.55),3px 3px 0 #000;line-height:.9;position:relative;z-index:1;letter-spacing:.08em}
.site-sub{font-family:'Cutive Mono',monospace;font-size:.75rem;letter-spacing:.35em;color:var(--parchment-dim);text-transform:uppercase;margin-top:10px;position:relative;z-index:1}

/* sticky controls */
.controls{position:sticky;top:0;z-index:100;background:rgba(10,10,10,.97);backdrop-filter:blur(8px);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.ctrl-label{font-family:'Cutive Mono',monospace;font-size:.62rem;letter-spacing:.2em;color:var(--text-dim);text-transform:uppercase;white-space:nowrap}
.year-buttons{display:flex;flex-wrap:wrap;gap:4px;flex:1;min-width:0}
.year-btn{background:transparent;border:1px solid var(--border);color:var(--text-dim);font-family:'Cutive Mono',monospace;font-size:.72rem;padding:4px 9px;cursor:pointer;transition:all .12s;white-space:nowrap}
.year-btn:hover{border-color:var(--red-dim);color:var(--parchment);background:rgba(192,57,43,.07)}
.year-btn.active{background:var(--red);border-color:var(--red);color:#fff;box-shadow:0 0 8px rgba(192,57,43,.35)}
.action-btn{background:transparent;border:1px solid var(--red-dim);color:var(--red);font-family:'Cutive Mono',monospace;font-size:.66rem;padding:5px 11px;cursor:pointer;transition:all .12s;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap}
.action-btn:hover{background:var(--red);color:#fff}

/* type filter row */
.type-filters{padding:8px 20px;background:var(--deep);border-bottom:1px solid var(--border);display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.type-btn{background:transparent;border:1px solid;font-family:'Cutive Mono',monospace;font-size:.68rem;padding:4px 12px;cursor:pointer;transition:all .12s;text-transform:uppercase;letter-spacing:.06em;border-radius:2px}
.type-btn.tb-house{color:#e74c3c;border-color:rgba(231,76,60,.4)}
.type-btn.tb-house.active,.type-btn.tb-house:hover{background:#e74c3c;color:#fff;border-color:#e74c3c}
.type-btn.tb-scarezone{color:var(--orange);border-color:rgba(230,126,18,.4)}
.type-btn.tb-scarezone.active,.type-btn.tb-scarezone:hover{background:var(--orange);color:#fff;border-color:var(--orange)}
.type-btn.tb-show{color:var(--yellow);border-color:rgba(241,196,15,.4)}
.type-btn.tb-show.active,.type-btn.tb-show:hover{background:var(--yellow);color:#111;border-color:var(--yellow)}
.type-btn.tb-note{color:var(--purple);border-color:rgba(142,68,173,.4)}
.type-btn.tb-note.active,.type-btn.tb-note:hover{background:var(--purple);color:#fff;border-color:var(--purple)}

/* search */
.search-row{padding:8px 20px;background:var(--deep);border-bottom:1px solid var(--border);display:flex;gap:8px}
.search-input{flex:1;background:var(--card);border:1px solid var(--border);color:var(--text);font-family:'Special Elite',serif;font-size:.9rem;padding:8px 14px;outline:none;transition:border-color .18s}
.search-input:focus{border-color:var(--red-dim);box-shadow:0 0 0 2px rgba(192,57,43,.1)}
.search-input::placeholder{color:var(--text-dim)}

/* status / loading */
@keyframes shimmer{0%{left:-40%}100%{left:100%}}
#loadingBar{display:none;background:var(--red);height:3px;width:100%;position:relative;overflow:hidden}
#loadingBar div{position:absolute;height:100%;width:40%;background:rgba(255,255,255,.3);animation:shimmer 1s infinite linear}
#statusMsg{display:none;margin:10px 20px;font-family:'Cutive Mono',monospace;font-size:.7rem;padding:10px 14px;border:1px solid;line-height:1.5}
.status-loading{color:var(--parchment-dim);border-color:var(--border);background:rgba(255,255,255,.02)}
.status-ok{color:var(--green);border-color:rgba(39,174,96,.3);background:rgba(39,174,96,.05)}
.status-warn{color:var(--orange);border-color:rgba(230,126,18,.3);background:rgba(230,126,18,.05)}

/* stats */
.stats-bar{padding:6px 20px;background:var(--deep);border-bottom:1px solid var(--border);display:flex;gap:16px;flex-wrap:wrap}
.stat{font-family:'Cutive Mono',monospace;font-size:.66rem;color:var(--text-dim)}
.stat b{color:var(--orange)}

/* main */
main{padding:20px;max-width:1500px;margin:0 auto}

/* year section */
.year-section{margin-bottom:40px;animation:fadeUp .22s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.year-header{display:flex;align-items:baseline;gap:12px;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border);position:relative}
.year-header::after{content:'';position:absolute;bottom:-1px;left:0;width:48px;height:2px;background:var(--red);box-shadow:0 0 8px var(--red)}
.year-label{font-family:'Creepster',cursive;font-size:3rem;color:var(--red);text-shadow:2px 2px 0 #000;line-height:1}
.year-count{margin-left:auto;font-family:'Cutive Mono',monospace;font-size:.62rem;color:var(--text-dim);background:var(--card);border:1px solid var(--border);padding:3px 8px}

/* type group within year */
.type-group{margin-bottom:18px}
.type-group-header{font-family:'Cutive Mono',monospace;font-size:.65rem;letter-spacing:.2em;text-transform:uppercase;padding:4px 10px;margin-bottom:10px;display:inline-flex;align-items:center;gap:6px;border-left:3px solid}
.tgh-house{color:#e74c3c;border-color:#e74c3c;background:rgba(231,76,60,.07)}
.tgh-scarezone{color:var(--orange);border-color:var(--orange);background:rgba(230,126,18,.07)}
.tgh-show{color:var(--yellow);border-color:var(--yellow);background:rgba(241,196,15,.07)}
.tgh-note{color:var(--purple);border-color:var(--purple);background:rgba(142,68,173,.07)}

/* cards */
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px}
.card{background:var(--card);border:1px solid var(--border);padding:13px 15px;position:relative;transition:all .16s;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;transition:background .16s,box-shadow .16s}
.card-house::before{background:rgba(231,76,60,.4)}
.card-scarezone::before{background:rgba(230,126,18,.4)}
.card-show::before{background:rgba(241,196,15,.4)}
.card-note::before{background:rgba(142,68,173,.4)}
.card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.5)}
.card-house:hover{border-color:rgba(231,76,60,.4)}
.card-house:hover::before{background:#e74c3c;box-shadow:0 0 8px #e74c3c}
.card-scarezone:hover{border-color:rgba(230,126,18,.4)}
.card-scarezone:hover::before{background:var(--orange);box-shadow:0 0 8px var(--orange)}
.card-show:hover{border-color:rgba(241,196,15,.3)}
.card-show:hover::before{background:var(--yellow);box-shadow:0 0 8px var(--yellow)}
.card-note:hover{border-color:rgba(142,68,173,.4)}
.card-note:hover::before{background:var(--purple);box-shadow:0 0 8px var(--purple)}
.card-title{font-family:'Special Elite',serif;font-size:.95rem;color:var(--parchment);line-height:1.3;margin-bottom:7px}
.card-title mark{background:rgba(192,57,43,.35);color:var(--parchment);border-radius:2px;padding:0 2px}
.card-meta{display:flex;flex-wrap:wrap;gap:5px}
.meta-tag{font-family:'Cutive Mono',monospace;font-size:.6rem;color:var(--text-dim);background:rgba(255,255,255,.03);border:1px solid var(--border);padding:2px 7px;letter-spacing:.04em}
.meta-date{color:var(--orange)}
.meta-loc{color:var(--parchment-dim)}

.empty{text-align:center;padding:80px 20px;font-family:'Creepster',cursive;color:var(--red-dim);font-size:2rem}

/* scrollbar */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:var(--black)}
::-webkit-scrollbar-thumb{background:var(--red-dim);border-radius:3px}

footer{text-align:center;padding:28px 20px;border-top:1px solid var(--border);margin-top:28px;font-family:'Cutive Mono',monospace;font-size:.6rem;color:var(--text-dim);letter-spacing:.12em}

@media(max-width:600px){.cards-grid{grid-template-columns:1fr}.site-title{font-size:3rem}main{padding:12px}}
</style>
</head>

let liveData = [...FALLBACK_DATA];
let selectedYears = new Set();
let selectedTypes = new Set(['HOUSE','SCAREZONE','SHOW','NOTE']);

// ── fetch ────────────────────────────────────
async function fetchSheets() {
  setStatus('🩸 Syncing from Google Sheet…','loading');
  showLoading(true);
  try {
    const res = await Promise.race([
      fetch(SHEETDB_URL),
      new Promise((_,rej)=>setTimeout(()=>rej(new Error('Timeout')),10000))
    ]);
    if (!res.ok) throw new Error('HTTP '+res.status);
    const json = await res.json();
    if (!Array.isArray(json)||!json.length) throw new Error('Empty response');
    const first = json[0];
    const yearKey  = Object.keys(first).find(k=>/year/i.test(k));
    const nameKey  = Object.keys(first).find(k=>/attraction|name|title/i.test(k));
    const typeKey  = Object.keys(first).find(k=>/type|category|h,/i.test(k));
    const locKey   = Object.keys(first).find(k=>/location|venue/i.test(k));
    const dateKey  = Object.keys(first).find(k=>/date/i.test(k));
    if (!yearKey||!nameKey) throw new Error('Cannot find Year/Attraction columns');
    const parsed = [];
    json.forEach(row=>{
      const year=parseInt(row[yearKey]);
      const attraction=(row[nameKey]||'').trim();
      if (!year||!attraction) return;
      let type=(typeKey?row[typeKey]||'':'').toUpperCase().trim();
      if (type==='HOUSES') type='HOUSE';
      if (type==='SHOWS') type='SHOW';
      if (type==='SCAREZONES'||type==='SCARE ZONE') type='SCAREZONE';
      if (!['HOUSE','SCAREZONE','SHOW','NOTE'].includes(type)) type='NOTE';
      parsed.push({
        year,
        attraction,
        type,
        location:(locKey?row[locKey]||'':'').trim(),
        date:(dateKey?row[dateKey]||'':'').trim()
      });
    });
    if (!parsed.length) throw new Error('No valid rows');
    liveData=parsed;
    selectedYears=new Set();
    setStatus('✅ Synced — '+parsed.length+' attractions loaded from your Google Sheet.','ok');
    refresh();
  } catch(err) {
    console.warn('SheetDB failed:',err.message);
    setStatus('⚠️ Live sync failed ('+err.message+'). Showing built-in data.','warn');
    liveData=[...FALLBACK_DATA];
    refresh();
  } finally { showLoading(false); }
}

function showLoading(on){document.getElementById('loadingBar').style.display=on?'block':'none'}
function setStatus(msg,type){
  const el=document.getElementById('statusMsg');
  el.textContent=msg; el.className='status-'+type; el.style.display='block';
}

// ── year buttons ─────────────────────────────
function refresh(){
  const years=[...new Set(liveData.map(d=>d.year))].sort((a,b)=>b-a);
  if (!selectedYears.size) selectedYears=new Set(years);
  buildYearBtns(years);
  render();
}

function buildYearBtns(years){
  const c=document.getElementById('yearBtns');
  c.innerHTML='';
  years.forEach(y=>{
    const b=document.createElement('button');
    b.className='year-btn'+(selectedYears.has(y)?' active':'');
    b.textContent=y;
    b.onclick=()=>{selectedYears.has(y)?selectedYears.delete(y):selectedYears.add(y);buildYearBtns(years);render()};
    c.appendChild(b);
  });
}

function selectAll(){selectedYears=new Set([...new Set(liveData.map(d=>d.year))]);refresh()}
function clearAll(){selectedYears=new Set();const years=[...new Set(liveData.map(d=>d.year))].sort((a,b)=>b-a);buildYearBtns(years);render()}

// ── type filter ──────────────────────────────
function toggleType(btn){
  const t=btn.dataset.type;
  if (selectedTypes.has(t)){
    if (selectedTypes.size===1) return; // keep at least one
    selectedTypes.delete(t);
    btn.classList.remove('active');
  } else {
    selectedTypes.add(t);
    btn.classList.add('active');
  }
  render();
}

// ── render ────────────────────────────────────
function render(){
  const q=document.getElementById('searchInput').value.toLowerCase().trim();
  const esc=q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');

  const filtered=liveData.filter(d=>
    selectedYears.has(d.year) &&
    selectedTypes.has(d.type) &&
    (!q||d.attraction.toLowerCase().includes(q)||d.location.toLowerCase().includes(q)||String(d.year).includes(q)||d.date.toLowerCase().includes(q))
  );

  const years=[...new Set(filtered.map(d=>d.year))].sort((a,b)=>b-a);
  const counts={};
  TYPE_ORDER.forEach(t=>{counts[t]=filtered.filter(d=>d.type===t).length});

  document.getElementById('statsBar').innerHTML=
    `<div class="stat">Showing <b>${filtered.length}</b> attractions</div>`+
    `<div class="stat">Years: <b>${years.length}</b></div>`+
    TYPE_ORDER.filter(t=>counts[t]>0).map(t=>`<div class="stat">${TYPE_LABELS[t].split(' ').slice(1).join(' ')}: <b>${counts[t]}</b></div>`).join('');

  const main=document.getElementById('main');
  if (!filtered.length){main.innerHTML='<div class="empty">Nothing Stirs in the Dark…</div>';return}

  const byYear={};
  filtered.forEach(d=>{(byYear[d.year]=byYear[d.year]||[]).push(d)});

  main.innerHTML=years.map(year=>{
    const entries=byYear[year];
    // group by type within year
    const byType={};
    entries.forEach(e=>{(byType[e.type]=byType[e.type]||[]).push(e)});

    const typeGroups=TYPE_ORDER.filter(t=>byType[t]&&byType[t].length).map(t=>{
      const cls=TYPE_CLS[t];
      const cards=byType[t].map(e=>{
        const title=q?e.attraction.replace(new RegExp(`(${esc})`,'gi'),'<mark>$1</mark>'):e.attraction;
        const locHtml=q&&e.location?e.location.replace(new RegExp(`(${esc})`,'gi'),'<mark>$1</mark>'):e.location;
        return `<div class="card card-${cls}">
          <div class="card-title">${title}</div>
          <div class="card-meta">
            ${e.date?`<span class="meta-tag meta-date">📅 ${e.date}</span>`:''}
            ${e.location?`<span class="meta-tag meta-loc">📍 ${locHtml}</span>`:''}
          </div>
        </div>`;
      }).join('');
      return `<div class="type-group">
        <div class="type-group-header tgh-${cls}">${TYPE_LABELS[t]} <span style="opacity:.6;font-size:.9em">(${byType[t].length})</span></div>
        <div class="cards-grid">${cards}</div>
      </div>`;
    }).join('');

    return `<section class="year-section">
      <div class="year-header">
        <div class="year-label">${year}</div>
        <div class="year-count">${entries.length} attractions</div>
      </div>
      ${typeGroups}
    </section>`;
  }).join('');
}

// ── init ──────────────────────────────────────
function init(){
  const bar=document.getElementById('drips');
  for(let i=0;i<28;i++){
    const d=document.createElement('div');
    d.className='drip';
    d.style.cssText=`--h1:${(Math.random()*10+4).toFixed(0)}px;--h2:${(Math.random()*38+10).toFixed(0)}px;--dur:${(Math.random()*2+2).toFixed(1)}s;--delay:${(Math.random()*3).toFixed(1)}s`;
    bar.appendChild(d);
  }
  fetchSheets();
}

init();
</script>
